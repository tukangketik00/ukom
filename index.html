<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulasi CAT</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.grid {
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:5px;
}

.grid div {
  padding:2px;
  text-align:center;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.belum {
    background: #ee6e6e;
}
.sudah { background:green; }
.aktif { border:2px solid black; }

.option {
  border:1px solid #ddd;
  border-radius:6px;
  padding:10px;
  margin-bottom:10px;
  cursor:pointer;
}
</style>

</head>

<body class="bg-light">

<!-- HEADER -->
<div class="bg-primary text-white p-3 d-flex justify-content-between flex-wrap">
  <div>
    Waktu: <span id="timer">120:00</span> |
    Soal: <span id="total">0</span> |
    Dijawab: <span id="jawab">0</span>
  </div>

  <button onclick="selesai()" class="btn btn-danger">
    Selesai Ujian
  </button>
</div>

<div class="container-fluid mt-3">
  <div class="row">

    <!-- KIRI -->
    <div class="col-md-8 order-1 order-md-1">
      <div class="card p-3" id="quiz">

        <h5 id="nomor"></h5>
        <p id="soal"></p>

        <div id="opsi"></div>

        <div class="d-flex gap-2 mt-3">
          <button onclick="lewati()" class="btn btn-secondary w-50">
            Lewatkan
          </button>

          <button onclick="next()" class="btn btn-primary w-50">
            Simpan & Lanjut
          </button>
        </div>

      </div>

      <div id="hasil" class="card p-3 d-none mt-3"></div>
    </div>

    <!-- KANAN -->
    <div class="col-md-4 order-2 order-md-2 mt-3 mt-md-0">
      <div class="card p-2">
        <div class="grid" id="grid"></div>
      </div>
    </div>

  </div>
</div>

<script>

// =====================
// CONFIG
// =====================
const config = {
  "Pengkajian holistik (fisik, psikologis, sosial, spiritual)": 5,
  "Diagnosa keperawatan sesuai NANDA-I": 5,
  "Penyusunan rencana asuhan dan implementasi (NIC)": 5,
  "Evaluasi keperawatan berbasis NOC": 7,
  "Manajemen pasien dengan gangguan (asma, PPOK, TBC, hipertensi, CHF, DVT)": 5,
  "Perawatan pasien gastrointestinal (gastritis, hepatitis, ulkus peptikum)": 3,
  "Prinsip penanganan nyeri akut dan kronik": 5,
  "Perawatan luka dan pencegahan infeksi nosokomial": 5,
  "Triage pasien (prioritas penanganan pasien gawat darurat)": 5,
  "Manajemen syok, trauma kepala, dan luka bakar": 7,
  "Manajemen demam, diare, ISPA pada anak, Pelaksanaan imunisasi dan edukasi orang tua": 5,
  "Teknik komunikasi terapeutik dengan anak dan keluarga": 5,
  "Pemantauan ibu hamil dan edukasi tanda bahaya kehamilan": 5,
  "Perawatan ibu post SC dan post partum serta Perawatan payudara dan dukungan laktasi": 5,
  "Prosedur dasar seperti RJP, oksigenasi, pemasangan infus dan NGT": 10,
  "Monitoring tanda vital & EKG": 5,
  "Penyuluhan PHBS, promosi kesehatan, pendampingan pasien kronis di rumah": 5,
  "Hak dan kewajiban perawat sesuai UU Praktik Keperawatan": 5,
  "Prinsip informed consent dan dokumentasi SOAP": 3
};

let quiz = [];
let index = 0;
let jawabanUser = {};
let waktu = 120 * 60;

// =====================
function lewati(){
  if(index < quiz.length-1){
    index++;
    tampil();
  }
}

// =====================
function init(){
  if(localStorage.getItem("quiz")){
    quiz = JSON.parse(localStorage.getItem("quiz"));
    jawabanUser = JSON.parse(localStorage.getItem("jawaban")) || {};
    waktu = parseInt(localStorage.getItem("waktu")) || waktu;
  } else {
    generateSoal();
  }

  document.getElementById("total").innerText = quiz.length;

  renderGrid();
  tampil();
  startTimer();
}

// =====================
function generateSoal(){
  quiz = [];

  for(let jenis in config){
    let pool = allSoal.filter(s => s.jenis_tes === jenis);
    shuffle(pool);

    let ambil = Math.min(config[jenis], pool.length);
    quiz = quiz.concat(pool.slice(0, ambil));
  }

  shuffle(quiz);

  localStorage.setItem("quiz", JSON.stringify(quiz));
}

// =====================
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// =====================
function tampil() {
  let s = quiz[index];

  document.getElementById("nomor").innerHTML = 
     '<label style="font-size:14px">Sub Test :  ' + s.jenis_tes + '</label><hr>'+'Soal ' + (index + 1) + '';
  document.getElementById("soal").innerText = s.soal;

  let html = "";
  ["a","b","c","d"].forEach(o => {
    let val = o.toUpperCase();
    let checked = jawabanUser[index] === val ? "checked" : "";

    html += `
    <div class="option">
      <input type="radio" name="jwb" value="${val}" ${checked}>
      ${val}. ${s[o]}
    </div>`;
  });
 
 

  document.getElementById("opsi").innerHTML = html;

  document.getElementById("jawab").innerText =
    Object.keys(jawabanUser).length;

  updateGrid();
}

// =====================
function next(){
  saveJawaban();

  if(index < quiz.length-1){
    index++;
    tampil();
  }
}

// =====================
function saveJawaban(){
  let pilih = document.querySelector('input[name=jwb]:checked');
  if(pilih){
    jawabanUser[index] = pilih.value;
    localStorage.setItem("jawaban", JSON.stringify(jawabanUser));
  }
}

// =====================
function renderGrid(){
  let g="";
  for(let i=0;i<quiz.length;i++){
    g += `<div onclick="goto(${i})" id="g${i}" class="belum">${i+1}</div>`;
  }
  document.getElementById("grid").innerHTML = g;
}

// =====================
function updateGrid(){
  for(let i=0;i<quiz.length;i++){
    let el = document.getElementById("g"+i);

    el.className = jawabanUser[i] ? "sudah":"belum";

    if(i===index) el.classList.add("aktif");
  }
}

// =====================
function goto(i){
  saveJawaban();
  index = i;
  tampil();
}

// =====================
function selesai(){

  saveJawaban();

  let skor = 0;

  quiz.forEach((s,i)=>{
    if(jawabanUser[i] === s.jawaban){
      skor += 5;
    }
  });

  localStorage.clear();

  document.getElementById("quiz").classList.add("d-none");

  let html = `<h4>Skor: ${skor}</h4><hr>`;

  quiz.forEach((s,i)=>{
    html += `
    <p><b>Soal ${i+1}</b><br>${s.soal}</p>
    <p>Jawaban kamu: ${jawabanUser[i]||"-"} | Kunci: ${s.jawaban}</p>
    <p><i>${s.pembahasan}</i></p><hr>`;
  });

  document.getElementById("hasil").innerHTML = html;
  document.getElementById("hasil").classList.remove("d-none");
}

// =====================
function startTimer(){
  setInterval(()=>{

    localStorage.setItem("waktu", waktu);

    let m = Math.floor(waktu/60);
    let s = waktu%60;

    document.getElementById("timer").innerText =
      String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

    if(waktu <= 0){
      selesai();
    }

    waktu--;

  },1000);
}

// =====================
document.addEventListener("click", e=>{
  if(e.target.closest(".option")){
    let r = e.target.closest(".option").querySelector("input");
    r.checked = true;
  }
});

// =====================
let allSoal = [];

fetch("ukom.json")
.then(res => res.json())
.then(data => {
  allSoal = data;
  init();
})
.catch(err => {
  alert("Gagal load JSON");
});

</script>

</body>
</html>
